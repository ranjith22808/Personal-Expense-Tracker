<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wealth Pro v10.26</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-slide-up { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal-active { transform: translateY(0) !important; }
        .tab-active { color: #4f46e5 !important; border-bottom: 2px solid #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; }
        .transfer-active { background-color: #4f46e5 !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <div id="lock-screen" class="fixed inset-0 bg-indigo-900 z-[100] flex flex-col items-center justify-center p-8 text-white">
        <h2 class="text-2xl font-black mb-4 italic uppercase">Wealth Pro Master</h2>
        <input type="password" id="pass-input" placeholder="Enter Key" class="w-full p-4 rounded-2xl bg-white/10 border border-white/20 mb-4 text-center outline-none">
        <button onclick="window.verifyLock()" class="w-full bg-white text-indigo-900 py-4 rounded-2xl font-black shadow-xl">UNLOCK</button>
    </div>

    <div id="main-ui" class="hidden">
        <div class="bg-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-xl sticky top-0 z-30">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-lg font-black tracking-tighter uppercase italic">Wealth Pro v10.26</h1>
                <button onclick="localStorage.removeItem('wealth_pro_key'); location.reload();" class="text-[8px] opacity-40 font-bold">LOGOUT</button>
            </div>
            <div id="balance-chips" class="flex gap-2 overflow-x-auto no-scrollbar mb-4 pb-2"></div>
            <div class="grid grid-cols-2 gap-3 text-center">
                <div class="bg-white/10 p-3 rounded-2xl border border-white/5"><p class="text-indigo-200 text-[9px] font-bold uppercase">Income</p><p id="total-income" class="text-xl font-black">₹0</p></div>
                <div class="bg-white/10 p-3 rounded-2xl border border-white/5"><p class="text-indigo-200 text-[9px] font-bold uppercase">Spent</p><p id="total-expense" class="text-xl font-black text-red-200">₹0</p></div>
            </div>
        </div>

        <div class="p-4 space-y-4">
            <div id="view-home"><div id="transaction-list" class="space-y-3"></div></div>
            <div id="view-stocks" class="hidden space-y-4">
                <div class="bg-indigo-600 text-white p-6 rounded-[2rem] shadow-lg text-center border-4 border-indigo-500/30">
                    <p class="text-[10px] text-indigo-100 uppercase font-black mb-1">Total Invested</p>
                    <p id="total-invested-amt" class="text-4xl font-black italic">₹0</p>
                </div>
                <div id="stock-list" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div id="view-debt" class="hidden space-y-4"><div id="debt-list" class="grid grid-cols-1 gap-3"></div></div>
            <div id="view-report" class="hidden space-y-6">
                <div class="bg-white p-4 rounded-3xl border shadow-sm space-y-3">
                    <div class="grid grid-cols-2 gap-2"><input type="date" id="filter-from" class="bg-gray-50 p-2 rounded-xl border text-xs"><input type="date" id="filter-to" class="bg-gray-50 p-2 rounded-xl border text-xs"></div>
                    <button onclick="window.generateAnalytics()" class="w-full bg-indigo-600 text-white py-2 rounded-xl font-bold">Apply Filters</button>
                </div>
                <canvas id="expenseChart" class="bg-white p-4 rounded-3xl border"></canvas>
                <div id="report-list" class="bg-white p-5 rounded-3xl border space-y-3"></div>
            </div>
            <div id="view-settings" class="hidden space-y-6">
                <div class="bg-white p-5 rounded-3xl border shadow-sm space-y-4">
                    <input type="text" id="new-pay-bank" placeholder="New Bank Name" class="w-full p-3 bg-gray-50 rounded-xl border">
                    <button onclick="window.savePaymentMethod()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold">Add Bank</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t flex justify-between px-2 py-3 items-center z-40 pb-8 shadow-2xl">
            <button onclick="window.switchView('home')" id="nav-home" class="tab-active flex-1 flex flex-col items-center"><span class="text-[10px] font-bold uppercase">Home</span></button>
            <button onclick="window.switchView('stocks')" id="nav-stocks" class="text-gray-400 flex-1 flex flex-col items-center"><span class="text-[10px] font-bold uppercase">Stocks</span></button>
            <button onclick="window.openModal()" class="bg-indigo-700 text-white p-4 rounded-2xl -mt-16 shadow-2xl active:scale-75 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
            </button>
            <button onclick="window.switchView('report')" id="nav-report" class="text-gray-400 flex-1 flex flex-col items-center"><span class="text-[10px] font-bold uppercase">Report</span></button>
            <button onclick="window.switchView('settings')" id="nav-settings" class="text-gray-400 flex-1 flex flex-col items-center"><span class="text-[10px] font-bold uppercase">Setup</span></button>
        </nav>

        <div id="entryModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-end">
            <div id="modal-container" class="bg-white w-full rounded-t-[3rem] p-8 modal-slide-up max-h-[95vh] overflow-y-auto">
                <form id="transactionForm" class="space-y-4">
                    <input type="hidden" id="editId">
                    
                    <div class="flex bg-gray-100 p-1 rounded-2xl">
                        <button type="button" id="typeExp" onclick="window.setType('Expense')" class="flex-1 py-3 rounded-xl font-bold bg-white text-red-600 shadow-sm uppercase text-xs">Expense</button>
                        <button type="button" id="typeInc" onclick="window.setType('Income')" class="flex-1 py-3 rounded-xl font-bold text-gray-500 uppercase text-xs">Income</button>
                        <button type="button" id="typeTrf" onclick="window.setType('Transfer')" class="flex-1 py-3 rounded-xl font-bold text-gray-500 uppercase text-xs">Transfer</button>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="amount" placeholder="₹ 0" class="w-full text-4xl font-black p-4 bg-transparent outline-none border-b" required>
                        <input type="date" id="entry-date" class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-xs border-none">
                    </div>

                    <div class="space-y-4" id="normal-fields">
                        <select id="category" onchange="window.updateSubCats()" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                        <select id="subCategory" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                        <select id="account" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                    </div>

                    <div class="space-y-4 hidden" id="transfer-fields">
                        <div class="text-[10px] font-black text-gray-400 uppercase px-2 tracking-widest">From This Account</div>
                        <select id="from-account" class="w-full p-4 bg-red-50 rounded-2xl font-bold border-none"></select>
                        <div class="text-[10px] font-black text-gray-400 uppercase px-2 tracking-widest">To This Account</div>
                        <select id="to-account" class="w-full p-4 bg-green-50 rounded-2xl font-bold border-none"></select>
                    </div>

                    <input type="text" id="note" placeholder="Note (Optional)" class="w-full p-4 bg-gray-50 rounded-2xl border-none">

                    <div class="flex gap-3 pt-4">
                        <button type="button" id="deleteBtn" onclick="window.confirmDelete()" class="hidden flex-1 bg-red-50 text-red-600 py-4 rounded-2xl font-bold uppercase text-xs">Delete</button>
                        <button type="submit" class="flex-[2] bg-indigo-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl">SAVE ENTRY</button>
                    </div>
                    <button type="button" onclick="window.closeModal()" class="w-full text-gray-400 font-bold py-2 text-sm">CANCEL</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, getDocs, orderBy, onSnapshot, Timestamp, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // CONFIG (Replace with your actual keys)
        const firebaseConfig = { apiKey: "AIzaSyA6Vr7-bsWTnahqnraTAZNcZHq3F5QzBqc", authDomain: "personal-expense-tracker-ef4c1.firebaseapp.com", projectId: "personal-expense-tracker-ef4c1", storageBucket: "personal-expense-tracker-ef4c1.firebasestorage.app", messagingSenderId: "280254535872", appId: "1:280254535872:web:ab5dddaaf5597c5fc77525" };
        const MASTER_PASS = "Matisha@2026";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentType = 'Expense';
        window.setType = (t) => { 
            currentType = t; 
            const isTrf = t === 'Transfer';
            document.getElementById('normal-fields').classList.toggle('hidden', isTrf);
            document.getElementById('transfer-fields').classList.toggle('hidden', !isTrf);
            
            document.getElementById('typeExp').className = t==='Expense' ? "flex-1 py-3 rounded-xl font-bold bg-white text-red-600 shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-gray-500"; 
            document.getElementById('typeInc').className = t==='Income' ? "flex-1 py-3 rounded-xl font-bold bg-white text-green-600 shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-gray-500"; 
            document.getElementById('typeTrf').className = t==='Transfer' ? "flex-1 py-3 rounded-xl font-bold bg-indigo-600 text-white shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-gray-500"; 
        };

        window.openModal = (i=null) => {
            const dInput = document.getElementById('entry-date');
            document.getElementById('editId').value = i ? i.id : "";
            document.getElementById('deleteBtn').classList.toggle('hidden', !i);
            if(i){
                document.getElementById('amount').value = i.amount;
                document.getElementById('category').value = i.category;
                window.updateSubCats();
                document.getElementById('subCategory').value = i.subCategory;
                document.getElementById('account').value = i.account;
                document.getElementById('note').value = i.note;
                const d = i.date instanceof Timestamp ? i.date.toDate() : new Date();
                dInput.value = d.toISOString().split('T')[0];
                window.setType(i.type);
            } else {
                document.getElementById('transactionForm').reset();
                dInput.value = new Date().toISOString().split('T')[0];
                window.setType('Expense');
            }
            document.getElementById('entryModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modal-container').classList.add('modal-active'), 10);
        };

        window.closeModal = () => { document.getElementById('modal-container').classList.remove('modal-active'); setTimeout(() => document.getElementById('entryModal').classList.add('hidden'), 300); };
        window.verifyLock = () => { if(document.getElementById('pass-input').value === MASTER_PASS) { localStorage.setItem('wealth_pro_key', MASTER_PASS); location.reload(); } else { alert("Wrong Key"); } };
        if(localStorage.getItem('wealth_pro_key') === MASTER_PASS) { document.getElementById('lock-screen').classList.add('hidden'); document.getElementById('main-ui').classList.remove('hidden'); initApp(); }

        function initApp() {
            let allData = [], dynamicCats = {}, loanBases = {}, myChart = null;
            const defaultCats = { "Grocery": {icon: "🛒", subs: ["Food"]}, "Investment": {icon: "📈", subs: ["Stocks"]}, "Internal Transfer": {icon: "🔄", subs: ["Bank to Bank"]} };

            onSnapshot(collection(db, "categories"), (snap) => {
                const catSel = document.getElementById('category'); 
                dynamicCats = JSON.parse(JSON.stringify(defaultCats));
                snap.forEach(d => { dynamicCats[d.data().name] = {subs: d.data().subs, icon: d.data().icon}; });
                catSel.innerHTML = ""; Object.entries(dynamicCats).forEach(([k,v]) => catSel.innerHTML += `<option value="${k}">${v.icon} ${k}</option>`);
                window.updateSubCats();
            });

            onSnapshot(collection(db, "payment_methods"), (snap) => {
                const accSel = document.getElementById('account');
                const fromSel = document.getElementById('from-account');
                const toSel = document.getElementById('to-account');
                accSel.innerHTML = ""; fromSel.innerHTML = ""; toSel.innerHTML = "";
                let m = ["Cash", "HDFC"]; snap.forEach(d => m.push(d.data().name));
                [...new Set(m)].forEach(p => {
                    const opt = `<option value="${p}">${p}</option>`;
                    accSel.innerHTML += opt; fromSel.innerHTML += opt; toSel.innerHTML += opt;
                });
            });

            onSnapshot(collection(db, "loan_bases"), (snap) => { loanBases = {}; snap.forEach(d => loanBases[d.id] = d.data().total); });

            onSnapshot(query(collection(db, "transactions"), orderBy("date", "desc")), (snap) => {
                allData = []; let inc = 0, exp = 0; const list = document.getElementById('transaction-list'); list.innerHTML = "";
                const wallet = {};
                snap.forEach(d => {
                    const item = {id: d.id, ...d.data()}; allData.push(item);
                    if(item.type === 'Income') { inc += item.amount; wallet[item.account] = (wallet[item.account] || 0) + item.amount; }
                    else { exp += item.amount; wallet[item.account] = (wallet[item.account] || 0) - item.amount; }
                    
                    list.innerHTML += `<div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-gray-100" onclick='window.openModal(${JSON.stringify(item)})'>
                        <div><p class="font-black text-gray-800 text-sm leading-none">${dynamicCats[item.category]?.icon || '💰'} ${item.category}</p><p class="text-[9px] text-gray-400 font-bold uppercase mt-1">${item.subCategory} • ${item.account}</p><p class="text-[10px] text-indigo-500 italic mt-0.5">${item.note || ''}</p></div>
                        <p class="font-black ${item.type === 'Income' ? 'text-green-600' : 'text-red-500'}">₹${item.amount.toLocaleString()}</p>
                    </div>`;
                });
                document.getElementById('total-income').innerText = `₹${inc.toLocaleString()}`;
                document.getElementById('total-expense').innerText = `₹${exp.toLocaleString()}`;
                const chips = document.getElementById('balance-chips'); chips.innerHTML = "";
                Object.entries(wallet).forEach(([bank, bal]) => { chips.innerHTML += `<div class="bg-white/20 px-4 py-2 rounded-2xl border border-white/10 shrink-0"><p class="text-[8px] uppercase font-bold text-indigo-200">${bank}</p><p class="text-sm font-black">₹${bal.toLocaleString()}</p></div>`; });
                renderStocks(); renderDebts();
            });

            window.updateSubCats = () => { const m = document.getElementById('category').value; const sub = document.getElementById('subCategory'); sub.innerHTML = ""; if(dynamicCats[m]) dynamicCats[m].subs.forEach(s => sub.innerHTML += `<option value="${s}">${s}</option>`); };
            window.switchView = (v) => { ['home', 'stocks', 'report', 'settings'].forEach(id => { document.getElementById(`view-${id}`).classList.toggle('hidden', id !== v); document.getElementById(`nav-${id}`).classList.toggle('tab-active', id === v); if (id !== v) document.getElementById(`nav-${id}`).classList.add('text-gray-400'); else document.getElementById(`nav-${id}`).classList.remove('text-gray-400'); }); if(v === 'report') window.generateAnalytics(); };

            document.getElementById('transactionForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const dVal = document.getElementById('entry-date').value;
                const amt = parseFloat(document.getElementById('amount').value);
                const note = document.getElementById('note').value;
                const ts = Timestamp.fromDate(new Date(dVal));

                if (currentType === 'Transfer') {
                    const fromAcc = document.getElementById('from-account').value;
                    const toAcc = document.getElementById('to-account').value;
                    if(fromAcc === toAcc) return alert("Accounts must be different!");
                    
                    // Outgoing Entry
                    await addDoc(collection(db, "transactions"), { type: 'Expense', amount: amt, category: 'Internal Transfer', subCategory: 'Bank to Bank', account: fromAcc, note: `Transfer to ${toAcc} ${note}`, date: ts });
                    // Incoming Entry
                    await addDoc(collection(db, "transactions"), { type: 'Income', amount: amt, category: 'Internal Transfer', subCategory: 'Bank to Bank', account: toAcc, note: `Received from ${fromAcc} ${note}`, date: ts });
                } else {
                    const id = document.getElementById('editId').value;
                    const p = { type: currentType, amount: amt, category: document.getElementById('category').value, subCategory: document.getElementById('subCategory').value, account: document.getElementById('account').value, note: note, date: ts };
                    id ? await updateDoc(doc(db, "transactions", id), p) : await addDoc(collection(db, "transactions"), p);
                }
                if (navigator.vibrate) navigator.vibrate(50); window.closeModal();
            });

            window.savePaymentMethod = async () => { const n = document.getElementById('new-pay-bank').value.trim(); if(n) { await addDoc(collection(db, "payment_methods"), { name: n }); alert("Added!"); } };
            function renderDebts() { /* ... same as 10.25 ... */ }
            function renderStocks() { const s = allData.filter(t => t.category.toLowerCase().includes("investment")); const totalI = s.reduce((sum, item) => sum + item.amount, 0); document.getElementById('total-invested-amt').innerText = `₹${totalI.toLocaleString()}`; const list = document.getElementById('stock-list'); if(!list) return; list.innerHTML = s.map(t => `<div class="bg-white p-4 rounded-3xl border flex justify-between shadow-sm"><p class="font-bold text-gray-800 text-sm">${t.note || t.subCategory}</p><p class="font-black text-indigo-700">₹${t.amount.toLocaleString()}</p></div>`).join(''); }
            window.generateAnalytics = () => { /* ... same as 10.25 ... */ };
        }
    </script>
</body>
</html>
