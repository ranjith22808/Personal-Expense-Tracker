<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Pro | Admin Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-slide-up { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal-active { transform: translateY(0); }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <div class="bg-indigo-700 text-white p-6 rounded-b-[2.5rem] shadow-2xl sticky top-0 z-30">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-sm font-black tracking-widest opacity-80 uppercase">Matisha Infotec</h1>
            <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold" id="date-now"></span>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white/10 p-3 rounded-2xl border border-white/5 backdrop-blur-md">
                <p class="text-indigo-200 text-[9px] font-bold uppercase tracking-tighter">Income</p>
                <p id="total-income" class="text-xl font-black">₹0</p>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl border border-white/5 backdrop-blur-md">
                <p class="text-indigo-200 text-[9px] font-bold uppercase tracking-tighter">Spent</p>
                <p id="total-expense" class="text-xl font-black text-red-300">₹0</p>
            </div>
        </div>
    </div>

    <div class="p-4 space-y-4">
        
        <div id="view-home" class="space-y-3">
            <div id="transaction-list" class="space-y-3"></div>
        </div>

        <div id="view-stocks" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">Investments</h2>
            <div id="stock-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="view-debt" class="hidden space-y-4">
            <h2 class="text-xl font-black text-gray-800">Active Loans</h2>
            <div id="debt-list" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="view-settings" class="hidden space-y-6">
            <h2 class="text-xl font-black text-gray-800">App Settings</h2>
            
            <div class="bg-white p-5 rounded-3xl shadow-sm border space-y-4">
                <p class="text-[10px] font-black text-gray-400 uppercase">Add New Category</p>
                <input type="text" id="new-cat-name" placeholder="Category Name (e.g. Health)" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none">
                <input type="text" id="new-cat-icon" placeholder="Icon Emoji (e.g. 🏥)" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none">
                <input type="text" id="new-cat-subs" placeholder="Sub-categories (comma separated)" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none">
                <button onclick="window.saveNewCategory()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm shadow-lg">Save Category</button>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border space-y-4">
                <p class="text-[10px] font-black text-gray-400 uppercase">Add Payment Method</p>
                <input type="text" id="new-pay-method" placeholder="Bank Name / Wallet" class="w-full p-3 bg-gray-50 rounded-xl text-sm border-none">
                <button onclick="window.savePaymentMethod()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold text-sm shadow-lg">Add Method</button>
            </div>
        </div>

        <div id="view-report" class="hidden space-y-4">
            <canvas id="expenseChart" class="bg-white p-4 rounded-3xl border shadow-sm"></canvas>
            <div id="report-list" class="bg-white p-5 rounded-3xl border space-y-3"></div>
            <button onclick="window.downloadExcel()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">📥 Download Excel Report</button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-between px-4 py-3 items-center z-40 pb-8 shadow-2xl">
        <button onclick="window.switchView('home')" id="nav-home" class="tab-active flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-width="2.5"></path></svg>
            <span class="text-[8px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="window.switchView('stocks')" id="nav-stocks" class="text-gray-400 flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-width="2.5"></path></svg>
            <span class="text-[8px] mt-1 font-bold">STOCKS</span>
        </button>
        <button onclick="window.openModal()" class="bg-indigo-700 text-white p-4 rounded-2xl -mt-16 shadow-2xl active:scale-75 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="4"></path></svg>
        </button>
        <button onclick="window.switchView('report')" id="nav-report" class="text-gray-400 flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2" stroke-width="2.5"></path></svg>
            <span class="text-[8px] mt-1 font-bold">REPORT</span>
        </button>
        <button onclick="window.switchView('settings')" id="nav-settings" class="text-gray-400 flex flex-col items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-width="2.5"></path></svg>
            <span class="text-[8px] mt-1 font-bold">SETTING</span>
        </button>
    </nav>

    <div id="entryModal" class="fixed inset-0 bg-black/70 z-50 hidden flex items-end">
        <div class="bg-white w-full rounded-t-[3rem] p-8 modal-slide-up max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="w-16 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <form id="transactionForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div class="flex bg-gray-100 p-1 rounded-2xl">
                    <button type="button" id="typeExp" onclick="window.setType('Expense')" class="flex-1 py-3 rounded-xl font-bold bg-white text-red-600 shadow-sm">EXPENSE</button>
                    <button type="button" id="typeInc" onclick="window.setType('Income')" class="flex-1 py-3 rounded-xl font-bold text-gray-500">INCOME</button>
                </div>
                <input type="number" id="amount" placeholder="₹ 0.00" class="w-full text-5xl font-black p-4 text-center bg-transparent focus:outline-none" required>
                <div class="space-y-4">
                    <select id="category" onchange="window.updateSubCats()" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                    <select id="subCategory" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                    <select id="account" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-none"></select>
                    <input type="text" id="note" placeholder="Note (e.g. Monthly Rent)" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" id="deleteBtn" onclick="window.confirmDelete()" class="hidden flex-1 bg-red-50 text-red-600 py-4 rounded-2xl font-bold">DELETE</button>
                    <button type="submit" class="flex-[2] bg-indigo-700 text-white py-4 rounded-2xl font-black text-lg">SAVE</button>
                </div>
                <button type="button" onclick="window.closeModal()" class="w-full text-gray-400 font-bold text-sm">CANCEL</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA6Vr7-bsWTnahqnraTAZNcZHq3F5QzBqc",
            authDomain: "personal-expense-tracker-ef4c1.firebaseapp.com",
            projectId: "personal-expense-tracker-ef4c1",
            storageBucket: "personal-expense-tracker-ef4c1.firebasestorage.app",
            messagingSenderId: "280254535872",
            appId: "1:280254535872:web:ab5dddaaf5597c5fc77525"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentType = 'Expense';
        let allData = [];
        let dynamicCats = {};
        let myChart = null;

        document.getElementById('date-now').innerText = new Date().toDateString();

        // 1. DYNAMIC CATEGORY SYNC
        onSnapshot(collection(db, "categories"), (snap) => {
            dynamicCats = {};
            const catSel = document.getElementById('category');
            catSel.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                dynamicCats[data.name] = { subs: data.subs, icon: data.icon };
                catSel.innerHTML += `<option value="${data.name}">${data.icon} ${data.name}</option>`;
            });
            updateSubCats();
        });

        // 2. DYNAMIC PAYMENT METHOD SYNC
        onSnapshot(collection(db, "payment_methods"), (snap) => {
            const accSel = document.getElementById('account');
            accSel.innerHTML = "";
            snap.forEach(d => {
                accSel.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });
        });

        window.updateSubCats = () => {
            const main = document.getElementById('category').value;
            const subSel = document.getElementById('subCategory');
            subSel.innerHTML = "";
            if(dynamicCats[main]) {
                dynamicCats[main].subs.forEach(s => subSel.innerHTML += `<option value="${s}">${s}</option>`);
            }
        };

        // ADMIN FUNCTIONS
        window.saveNewCategory = async () => {
            const name = document.getElementById('new-cat-name').value;
            const icon = document.getElementById('new-cat-icon').value;
            const subs = document.getElementById('new-cat-subs').value.split(',');
            if(!name || !icon) return alert("Fill Name and Icon");
            await addDoc(collection(db, "categories"), { name, icon, subs, createdAt: serverTimestamp() });
            alert("Category Added!");
            document.getElementById('new-cat-name').value = "";
        };

        window.savePaymentMethod = async () => {
            const name = document.getElementById('new-pay-method').value;
            if(!name) return;
            await addDoc(collection(db, "payment_methods"), { name });
            alert("Method Added!");
            document.getElementById('new-pay-method').value = "";
        };

        // VIEW NAVIGATION
        window.switchView = (view) => {
            ['home', 'stocks', 'debt', 'report', 'settings'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
                document.getElementById(`nav-${v}`).classList.remove('tab-active', 'text-indigo-600');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.add('tab-active', 'text-indigo-600');
            if(view === 'report') generateAnalytics();
        };

        // MODAL LOGIC
        window.openModal = (item = null) => {
            const modal = document.getElementById('entryModal');
            document.getElementById('editId').value = item ? item.id : "";
            document.getElementById('deleteBtn').classList.toggle('hidden', !item);
            if(item) {
                document.getElementById('amount').value = item.amount;
                document.getElementById('category').value = item.category;
                updateSubCats();
                document.getElementById('subCategory').value = item.subCategory;
                document.getElementById('account').value = item.account;
                document.getElementById('note').value = item.note;
                setType(item.type);
            } else {
                document.getElementById('transactionForm').reset();
                setType('Expense');
            }
            modal.classList.remove('hidden');
            setTimeout(() => modal.querySelector('.modal-slide-up').classList.add('modal-active'), 10);
        };

        window.closeModal = () => {
            document.querySelector('.modal-slide-up').classList.remove('modal-active');
            setTimeout(() => document.getElementById('entryModal').classList.add('hidden'), 300);
        };

        window.setType = (type) => {
            currentType = type;
            document.getElementById('typeExp').className = type === 'Expense' ? "flex-1 py-3 rounded-xl font-bold bg-white text-red-600 shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-gray-500";
            document.getElementById('typeInc').className = type === 'Income' ? "flex-1 py-3 rounded-xl font-bold bg-white text-green-600 shadow-sm" : "flex-1 py-3 rounded-xl font-bold text-gray-500";
        };

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const payload = {
                type: currentType,
                amount: parseFloat(document.getElementById('amount').value),
                category: document.getElementById('category').value,
                subCategory: document.getElementById('subCategory').value,
                account: document.getElementById('account').value,
                note: document.getElementById('note').value,
                date: id ? allData.find(x => x.id === id).date : serverTimestamp()
            };
            id ? await updateDoc(doc(db, "transactions", id), payload) : await addDoc(collection(db, "transactions"), payload);
            closeModal();
        });

        // DATA SYNC & RENDER
        onSnapshot(query(collection(db, "transactions"), orderBy("date", "desc")), (snap) => {
            allData = []; let inc = 0, exp = 0;
            const list = document.getElementById('transaction-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const item = {id: d.id, ...d.data()};
                allData.push(item);
                if(item.type === 'Income') inc += item.amount; else exp += item.amount;
                
                const icon = dynamicCats[item.category]?.icon || '💰';
                list.innerHTML += `<div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-gray-100" onclick="window.openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-xl">${icon}</div>
                        <div><p class="font-black text-gray-800 text-sm">${item.category}</p><p class="text-[9px] text-gray-400 font-bold uppercase">${item.subCategory}</p></div>
                    </div>
                    <p class="font-black ${item.type === 'Income' ? 'text-green-600' : 'text-red-500'}">${item.type === 'Income' ? '+' : '-'}₹${item.amount.toLocaleString()}</p>
                </div>`;
            });
            document.getElementById('total-income').innerText = `₹${inc.toLocaleString()}`;
            document.getElementById('total-expense').innerText = `₹${exp.toLocaleString()}`;
        });

        // REPORTS
        window.generateAnalytics = () => {
            const stats = {};
            allData.filter(t => t.type === 'Expense').forEach(t => stats[t.category] = (stats[t.category] || 0) + t.amount);
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: ['#4f46e5', '#ef4444', '#10b981', '#f59e0b', '#ec4899'] }] },
                options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { font: { weight: 'bold', size: 10 } } } } }
            });
        };
    </script>
</body>
</html>
